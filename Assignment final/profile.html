<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Cinematic Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cv-header">
        <div class="cv-header-inner">
            <a href="index.html" class="cv-logo">CINEMATIC VISION</a>
            <nav class="cv-nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="cart.html">Cart</a>
                <a href="my-orders.html">My Orders</a>
                <a href="order-history.html">History</a>
            </nav>
            <div class="cv-actions">
                <a href="shop.html" class="cv-btn-primary">SHOP NOW</a>
                <a href="cart.html" class="cv-cart">
                    <span class="cv-cart-icon">
                        <i class="fas fa-bag-shopping"></i>
                        <span class="cart-count">0</span>
                    </span>
                    <span>Cart</span>
                </a>
                
                <div class="cv-user-dropdown" id="userDropdown">
                    <div class="cv-login" id="userTrigger">
                        <span class="cv-avatar"><i class="fas fa-user"></i></span>
                        <span class="cv-login-text">Login</span>
                        <i class="fas fa-chevron-down dropdown-arrow"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-header">
                            <div class="dropdown-avatar"><i class="fas fa-user-circle"></i></div>
                            <div class="dropdown-user-info">
                                <span class="user-name">Guest User</span>
                                <span class="user-email">Please login</span>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="my-orders.html" class="dropdown-item">
                            <i class="fas fa-shopping-bag"></i><span>My Orders</span>
                            <span class="badge-pending" id="pendingBadge">0</span>
                        </a>
                        <a href="order-history.html" class="dropdown-item">
                            <i class="fas fa-history"></i><span>Order History</span>
                        </a>
                        <a href="wishlist.html" class="dropdown-item">
                            <i class="fas fa-heart"></i><span>Wishlist</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="profile.html" class="dropdown-item">
                            <i class="fas fa-user-edit"></i><span>Profile Settings</span>
                        </a>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i><span>Logout</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1 id="profileName">User Profile</h1>
                <p>Manage your personal information</p>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" disabled placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Your email">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Your phone number">
                </div>
                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> SAVE CHANGES
                </button>
            </form>

            <div class="back-home">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> BACK TO HOME
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
